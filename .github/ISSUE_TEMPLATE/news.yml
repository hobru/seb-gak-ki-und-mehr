name: "Neuigkeit vorschlagen"
description: "Einen privacy-sicheren Vorschlag für die Neuigkeiten-Seite einreichen."
title: "[Neuigkeit]: "
labels: ["news-vorschlag"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für den Vorschlag! Dieses Issue ist öffentlich sichtbar.

        **Wichtig:** Bitte keine personenbezogenen Daten eintragen – keine Namen, E-Mail-Adressen, Telefonnummern, Adressen, Fotos oder privaten Angaben zu einzelnen Personen.

        Die **Kurzbeschreibung darf maximal 220 Zeichen** lang sein. Längere Vorschläge können nicht automatisch in einen Pull Request umgewandelt werden.

        Bitte nutze das GitHub-Feld **Add a title** oben für den kurzen Nachrichtentitel. Ein Vorschlag wird erst nach redaktioneller Prüfung freigegeben. Die Veröffentlichung erfolgt über einen Pull Request, nicht direkt aus dem Issue.
  - type: textarea
    id: abstract
    attributes:
      label: "Kurzbeschreibung (max. 220 Zeichen)"
      description: "Worum geht es? Bitte vor dem Absenden auf maximal 220 Zeichen kürzen; keine personenbezogenen Daten."
      placeholder: "Max. 220 Zeichen, z. B.: Ein kurzer Einstieg in wichtige KI-Begriffe für Schülerinnen und Schüler."
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: "Details oder externer Link (optional)"
      description: "Optional: kurze Details oder ein öffentlich erreichbarer Link. Links werden technisch als http(s)-URL erkannt und vor Veröffentlichung redaktionell angesehen; das ist keine automatische Inhalts- oder Sicherheitsprüfung."
      placeholder: "Beispiel: https://example.org/material oder 2–3 Sätze Kontext."
  - type: dropdown
    id: audience
    attributes:
      label: "Zielgruppe"
      description: "Wer soll den Hinweis vor allem sehen? Mehrfachauswahl möglich."
      multiple: true
      options:
        - "Schüler:innen"
        - "Eltern"
        - "Lehrkräfte"
        - "SEB"
        - "Allgemein"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: "Thema/Kategorie"
      description: "Worum geht es inhaltlich? Mehrfachauswahl möglich."
      multiple: true
      options:
        - "KI"
        - "Informatik"
        - "Veranstaltung"
        - "Wettbewerb"
        - "Material"
        - "Empfehlung"
        - "Hinweis"
        - "Sonstiges"
    validations:
      required: true
  - type: textarea
    id: relevance
    attributes:
      label: "GAK/SEB-Relevanz"
      description: "Optional: Warum passt der Vorschlag zum GAK, zum SEB oder zur Schulgemeinschaft? 1–3 Sätze. Nur redaktionell, wird nicht veröffentlicht."
      placeholder: "Beispiel: Das Material unterstützt Eltern und Schüler:innen beim sicheren Umgang mit KI."
  - type: checkboxes
    id: no_pii
    attributes:
      label: "Datenschutz-Bestätigung"
      description: "Diese Bestätigung ist erforderlich, weil Issues öffentlich sichtbar sind."
      options:
        - label: "Ich bestätige, dass der Vorschlag keine personenbezogenen Daten enthält (keine Namen, E-Mail-Adressen, Telefonnummern, Adressen, Fotos oder privaten Angaben)."
          required: true
