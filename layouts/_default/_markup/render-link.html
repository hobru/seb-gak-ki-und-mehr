{{- $url := .Destination -}}
{{- $isExternal := or (strings.HasPrefix $url "http://") (strings.HasPrefix $url "https://") -}}
<a href="{{ $url }}"
  {{- with .Title }} title="{{ . }}"{{ end }}
  {{- if $isExternal }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .Text | safeHTML }}</a>
{{- /* render-link.html: external links get target=_blank + rel=noopener noreferrer automatically */ -}}
