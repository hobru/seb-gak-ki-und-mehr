<footer class="site-footer" role="contentinfo">
  <div class="container">
    <div class="site-footer__inner">
      <p class="site-footer__copy">
        &copy; {{ now.Year }} {{ site.Params.school }}
      </p>
      {{ with site.Params.seb_disclaimer }}
      <p class="site-footer__disclaimer">{{ . }}</p>
      {{ end }}
      <ul class="site-footer__links">
        <li><a href="{{ "/impressum/" | relURL }}">Impressum</a></li>
        <li><a href="{{ "/datenschutz/" | relURL }}">Datenschutz</a></li>
        <li><a href="{{ "/news/" | relURL }}">Neuigkeiten</a></li>
        <li><a href="{{ "/mitmachen/" | relURL }}">Mitmachen</a></li>
      </ul>
    </div>
  </div>
</footer>
