<header class="site-header" role="banner">
  <div class="container">
    <div class="site-header__inner">
      <a class="site-logo" href="{{ "/" | relURL }}" aria-label="{{ site.Params.shortName }} – Startseite">
        <span class="site-logo__name" aria-hidden="true">GAK Digital</span>
        <span class="site-logo__sub">Schulelternbeirat des Gymnasiums am Kaiserdom</span>
      </a>
      <nav class="site-nav" aria-label="Hauptnavigation">
        {{ $section := .Section }}
        {{ $isHome  := .IsHome }}
        {{ range site.Menus.main }}
          {{ $id     := .Identifier }}
          {{ $active := or (and $isHome (eq $id "home")) (and (not $isHome) (eq $section $id)) }}
          <a class="site-nav__link{{ if $active }} site-nav__link--active{{ end }}"
             href="{{ .URL | relURL }}"
             {{ if $active }}aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        {{ end }}
      </nav>
    </div>
  </div>
</header>
